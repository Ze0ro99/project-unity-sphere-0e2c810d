version: '3.9'

name: super-pi

x-base: &base
  restart: unless-stopped
  networks:
    - superpi-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"
      compress: "true"

x-env: &env
  NODE_ENV: production
  TZ: UTC
  PI_STABLECOIN_VALUE: "314159"
  PI_STABLECOIN_NAME: "Pure Pi Stablecoin"

x-deploy: &deploy
  resources:
    limits:
      memory: 1G
      cpus: '0.5'
    reservations:
      memory: 512M
      cpus: '0.25'

services:
  # 💰 SUPER PI COIN ($SPI) - USD STABLECOIN
  spi-stablecoin:
    build:
      context: ./packages/super-pi-coin
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
        - PNPM_VERSION=8.15
    ports:
      - "3009:3009"
    environment:
      <<: *env
      SPI_CONTRACT_ADDRESS: ${SPI_CONTRACT_ADDRESS}
      CHAINLINK_USD_FEED: ${CHAINLINK_USD_FEED}
      FIAT_API_KEYS: ${FIAT_API_KEYS}
      REDIS_URL: redis://redis:6379/6
      STABLECOIN_SERVICE: http://stablecoin-service:3007
      API_URL: http://api:3002
      PURITY_SERVICE: http://purity-node:3003
      GUARD_SERVICE: http://ecosystem-guard:3005
    volumes:
      - spi-data:/app/data
      - ./fiat-config:/app/fiat-config:ro
      - ./i18n:/app/i18n:ro
    depends_on:
      redis:
        condition: service_healthy
      blockchain:
        condition: service_healthy
      stablecoin-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3009/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    <<: *base
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  # 💎 STABLECOIN SERVICE - $314,159 GLOBAL ENFORCEMENT
  stablecoin-service:
    build:
      context: ./packages/stablecoin-value
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
        - PNPM_VERSION=8.15
    ports:
      - "3007:3007"
    environment:
      <<: *env
      REDIS_URL: redis://redis:6379/5
      STABLECOIN_RATE: ${PI_STABLECOIN_VALUE}
      PARTNER_SDK_ENABLED: "true"
      I18N_ENABLED: "true"
      SPI_STABLECOIN_URL: http://spi-stablecoin:3009  # NEW: SPI Integration
    volumes:
      - stablecoin-data:/app/data
      - ./i18n:/app/i18n:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3007/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *base
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  # 🌟 Pi Wallet (Stablecoin Displays + $SPI Support)
  wallet:
    build:
      context: ./apps/wallet
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
        - PNPM_VERSION=8.15
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      <<: *env
      NEXT_PUBLIC_API_URL: http://api:3002
      NEXT_PUBLIC_PURITY_API: http://purity-node:3003
      NEXT_PUBLIC_ECOSYSTEM_GUARD: http://ecosystem-guard:3005
      NEXT_PUBLIC_STABLECOIN_SERVICE: http://stablecoin-service:3007
      NEXT_PUBLIC_SPI_STABLECOIN: http://spi-stablecoin:3009  # NEW: $SPI Wallet Support
      NEXT_PUBLIC_EXPLORER_URL: http://explorer:3004
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/superpi
      REDIS_URL: redis://redis:6379/0
      WALLET_SECRET: ${WALLET_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STABLECOIN_ENFORCEMENT: "true"
      SPI_STABLECOIN_ENABLED: "true"  # NEW
    volumes:
      - wallet-cache:/app/.next/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      purity-node:
        condition: service_healthy
      ecosystem-guard:
        condition: service_healthy
      stablecoin-service:
        condition: service_healthy
      spi-stablecoin:  # NEW: SPI Dependency
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    <<: *base
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 768M

  # 🔗 Pi API + Smart Contracts + $SPI Transformer
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
    ports:
      - "3002:3002"
    environment:
      <<: *env
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/superpi
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      PI_BLOCKCHAIN_RPC: http://blockchain:8545
      PURITY_SERVICE: http://purity-node:3003
      ECOSYSTEM_GUARD: http://ecosystem-guard:3005
      STABLECOIN_SERVICE: http://stablecoin-service:3007
      SPI_STABLECOIN_SERVICE: http://spi-stablecoin:3009  # NEW: $SPI API Integration
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      STABLECOIN_TRANSFORMER: "true"
      SPI_TRANSFORMER_ENABLED: "true"  # NEW
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockchain:
        condition: service_healthy
      purity-node:
        condition: service_healthy
      stablecoin-service:
        condition: service_healthy
      spi-stablecoin:  # NEW: SPI Dependency
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    <<: *base
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: '1.5'
        reservations:
          memory: 1.5G

  # 🛡️ ECOSYSTEM GUARD - $SPI TAINT PROTECTION
  ecosystem-guard:
    build:
      context: ./packages/ecosystem-guard
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
    ports:
      - "3005:3005"
    environment:
      <<: *env
      REDIS_URL: redis://redis:6379/2
      TAINT_DB_INDEX: 2
      EXCHANGE_ORACLE_URLS: ${EXCHANGE_ORACLE_URLS}
      BLACKLIST_UPDATE_INTERVAL: 300
      STABLECOIN_SERVICE: http://stablecoin-service:3007
      SPI_STABLECOIN_SERVICE: http://spi-stablecoin:3009  # NEW: $SPI Guard Integration
      NODE_ID: ecosystem-guard-01
    volumes:
      - taint-data:/app/data
      - ./blacklists:/app/blacklists:ro
    depends_on:
      redis:
        condition: service_healthy
      purity-node:
        condition: service_healthy
      stablecoin-service:
        condition: service_healthy
      spi-stablecoin:  # NEW: SPI Dependency
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3005/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    <<: *base
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M

  # ... [ALL OTHER SERVICES REMAIN IDENTICAL - purity-node, partner-gateway, blockchain, db, redis, explorer, analytics, nginx, mail, prometheus, grafana, backup] ...

  # 🌟 Purity Tracker + $SPI Dual Value System
  purity-node:
    build:
      context: ./packages/purity-tracker
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
    ports:
      - "3003:3003"
    environment:
      <<: *env
      REDIS_URL: redis://redis:6379/3
      EXCHANGE_DB_URL: ${EXCHANGE_DB_URL}
      ML_MODEL_PATH: /app/models/taint-model-v3.onnx
      ECOSYSTEM_GUARD_URL: http://ecosystem-guard:3005
      STABLECOIN_SERVICE: http://stablecoin-service:3007
      SPI_STABLECOIN_SERVICE: http://spi-stablecoin:3009  # NEW: $SPI Purity Tracking
      TAINT_CHECK_ENABLED: "true"
    volumes:
      - purity-data:/app/data
      - ./models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
      ecosystem-guard:
        condition: service_healthy
      stablecoin-service:
        condition: service_healthy
      spi-stablecoin:  # NEW: SPI Dependency
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    <<: *base
    <<: *deploy

  # 📊 Block Explorer + $SPI Stablecoin Visualizer
  explorer:
    build:
      context: ./apps/explorer
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20.11
    ports:
      - "3004:3004"
    environment:
      <<: *env
      API_URL: http://api:3002
      BLOCKCHAIN_RPC: http://blockchain:8545
      PURITY_API: http://purity-node:3003
      GUARD_API: http://ecosystem-guard:3005
      STABLECOIN_SERVICE: http://stablecoin-service:3007
      SPI_STABLECOIN_SERVICE: http://spi-stablecoin:3009  # NEW: $SPI Explorer
    depends_on:
      api:
        condition: service_healthy
      blockchain:
        condition: service_healthy
      ecosystem-guard:
        condition: service_healthy
      stablecoin-service:
        condition: service_healthy
      spi-stablecoin:  # NEW: SPI Dependency
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: *base
    <<: *deploy

  # [REMAINING SERVICES: partner-gateway, blockchain, db, redis, analytics, nginx, mail, prometheus, grafana, backup - NO CHANGES NEEDED]
  # ... (copy the rest exactly as provided in your original)

  superpi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    enable_ipv6: false

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  blockchain-data:
    driver: local
  purity-data:
    driver: local
  taint-data:
    driver: local
  stablecoin-data:
    driver: local
  spi-data:  # NEW: SPI Volume
    driver: local
  partner-data:
    driver: local
  wallet-cache:
    driver: local
  certbot-www:
    driver: local
  nginx-logs:
    driver: local
  mail-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
