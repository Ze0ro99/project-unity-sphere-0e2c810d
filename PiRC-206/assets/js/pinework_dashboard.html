<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiRC Cross-Layer Dashboard</title>
    <style>
      :root {
        --bg: #f4f7ef;
        --panel: #ffffff;
        --ink: #1d2a35;
        --accent: #0b7a75;
        --accent-2: #f4a259;
      }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #d9efe1, var(--bg));
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: var(--panel);
        border: 1px solid #d9e2e8;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 12px 28px rgba(23, 46, 64, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }
      ul {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        list-style: none;
        padding: 0;
      }
      li {
        padding: 12px;
        border-radius: 12px;
        background: linear-gradient(135deg, #f9fcff, #edf5f9);
        border-left: 5px solid var(--accent);
      }
      .meta {
        margin-top: 16px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .pill {
        background: #ecf7f5;
        color: #064a46;
        border: 1px solid #c4e8e4;
        border-radius: 999px;
        padding: 8px 14px;
      }
      .warn {
        background: #fff5ea;
        color: #7b4a12;
        border-color: #ffddb7;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>PiRC-206 Cross-Layer Interoperability Dashboard</h1>
        <ul id="layers"></ul>
        <div class="meta" id="meta"></div>
      </section>
    </main>
    <script>
      async function load() {
        const res = await fetch('/.netlify/functions/dashboard');
        const data = await res.json();

        const layers = document.getElementById('layers');
        layers.innerHTML = data.layers.map((layer) => `<li>${layer}</li>`).join('');

        const meta = document.getElementById('meta');
        meta.innerHTML = [
          `<span class="pill">${data.compliance}</span>`,
          `<span class="pill warn">Engagement: ${data.engagementScore}</span>`
        ].join('');
      }

      load().catch((err) => {
        const meta = document.getElementById('meta');
        meta.innerHTML = `<span class="pill warn">Dashboard error: ${err.message}</span>`;
      });
    </script>
  </body>
</html>
