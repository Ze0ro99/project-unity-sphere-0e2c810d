name: Auto-Update PiRC Table in README

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/generate_pirc_table.py'
      - 'scripts/update_readme_table.py'
      - 'README.md'
  workflow_dispatch:

jobs:
  update-table:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate PiRC Table
        run: python scripts/generate_pirc_table.py > table.md

      - name: Update README with new table
        run: python scripts/update_readme_table.py

      - name: Commit and Push if changed
        run: |
          git config user.name "PiRC-AutoBot"
          git config user.email "bot@ze0ro99.dev"
          if ! git diff --quiet README.md; then
            git add README.md
            git commit -m "chore: auto-update PiRC proposals table [skip ci]"
            git push
          else
            echo "No changes to README.md"
          fi
