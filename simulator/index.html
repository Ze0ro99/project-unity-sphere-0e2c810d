<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PiRC-101 Justice Engine Visualizer</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #fff; padding: 2rem; max-width: 600px; margin: auto; }
        .card { background: #16213e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #a0aab2; }
        input { width: 100%; padding: 8px; border-radius: 4px; border: none; background: #2a3b5c; color: white; }
        .stat { font-size: 1.5rem; color: #e94560; font-weight: bold; margin-top: 5px; }
        .healthy { color: #4caf50; }
        .warning { color: #ff9800; }
        .critical { color: #f44336; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚖️ PiRC-101 State Machine</h2>
        
        <div class="input-group">
            <label>External Pi Price (USD)</label>
            <input type="number" id="piPrice" value="0.314" step="0.01" oninput="calculateState()">
        </div>
        
        <div class="input-group">
            <label>AMM Liquidity Depth (USD)</label>
            <input type="number" id="liquidity" value="10000000" step="100000" oninput="calculateState()">
        </div>
        
        <div class="input-group">
            <label>Total Circulating REF Supply</label>
            <input type="number" id="refSupply" value="500000000" step="1000000" oninput="calculateState()">
        </div>

        <hr style="border-color: #0f3460; margin: 20px 0;">

        <p>Throttling Coefficient (Φ): <div id="phiDisplay" class="stat healthy">1.0000</div></p>
        <p>Minting Power (1 Pi = ? REF): <div id="mintPowerDisplay" class="stat">3,140,000 REF</div></p>
    </div>

    <script>
        const QWF = 10000000;
        const GAMMA = 1.5;
        const DAILY_EXIT_CAP = 0.001; // 0.1%

        function calculateState() {
            const price = parseFloat(document.getElementById('piPrice').value);
            const liquidity = parseFloat(document.getElementById('liquidity').value);
            const supply = parseFloat(document.getElementById('refSupply').value);

            let phi = 1.0;
            if (supply > 0) {
                const availableExit = liquidity * DAILY_EXIT_CAP;
                const ratio = availableExit / (supply / QWF);
                
                if (ratio < GAMMA) {
                    phi = Math.pow(ratio / GAMMA, 2); // Quadratic collapse
                }
            }

            const mintPower = price * QWF * phi;

            // Update UI
            const phiEl = document.getElementById('phiDisplay');
            phiEl.innerText = phi.toFixed(4);
            phiEl.className = 'stat ' + (phi > 0.8 ? 'healthy' : (phi > 0.3 ? 'warning' : 'critical'));

            document.getElementById('mintPowerDisplay').innerText = 
                new Intl.NumberFormat().format(mintPower.toFixed(0)) + " REF";
        }

        // Init
        calculateState();
    </script>
</body>
</html>
