name: Upstream PiRC 6h Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Triggers automatically every 6 hours
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI

jobs:
  sync_upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "Ze0ro99"
          git config user.email "ze0ro99@users.noreply.github.com"

      - name: Fetch and Merge PiRC Upstream
        run: |
          git remote add pirc https://github.com/Ze0ro99/PiRC.git || true
          git fetch pirc
          git merge pirc/main --allow-unrelated-histories --no-edit || echo "Sync clean"
          git push origin HEAD:main
