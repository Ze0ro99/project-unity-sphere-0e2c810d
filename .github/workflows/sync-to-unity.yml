name: Automated Upstream PiRC Synchronization Engine

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  synchronize-and-align:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Target Repository (Unity Sphere)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git Identity
        run: |
          git config --global user.name "Ze0ro99"
          git config --global user.email "kamelkadah910@gmail.com"

      - name: Clone Upstream Source Ecosystem (PiRC)
        run: |
          git clone --recursive https://github.com/Ze0ro99/PiRC.git upstream_pirc

      - name: Adaptive Execution of Sync Logic
        run: |
          echo "Executing mirroring routines..."
          if [ -d "upstream_pirc/packages" ]; then
            rsync -av --delete --exclude='.git' --exclude='.github' upstream_pirc/packages/ packages/
          fi
          if [ -d "upstream_pirc/docs" ]; then
            rsync -av --delete --exclude='.git' --exclude='.github' upstream_pirc/docs/ docs/
          fi
          if [ -d "upstream_pirc/standards" ]; then
            rsync -av --delete --exclude='.git' --exclude='.github' upstream_pirc/standards/ standards/
          fi
          rm -rf upstream_pirc

      - name: Verify Configurations and Auto-Commit
        run: |
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Automated Cron Sync: Aligned with latest upstream PiRC definitions [Skip CI]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "Ecosystem already synchronized. No actions required."
          fi
