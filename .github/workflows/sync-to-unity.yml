name: Automated Multi-Branch Global Synchronization Engine

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  align-all-branches-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Target Lovable Repository Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Global Cryptographic Identity
        run: |
          git config --global user.name "Ze0ro99"
          git config --global user.email "kamelkadah910@gmail.com"

      - name: Clone Full Sovereign Source Ecosystem (PiRC)
        run: |
          git clone --mirror https://github.com/Ze0ro99/PiRC.git upstream_pirc_mirror

      - name: Deep Multi-Branch Extraction and Recursive Sync Matrix
        run: |
          cd upstream_pirc_mirror
          # Extract all pure remote branches from the mirror template
          ALL_UPSTREAM_BRANCHES=$(git branch -r | grep -v '\->' | sed 's/origin\///g' || git branch | sed 's/\*//g' | xargs)
          cd ..

          echo "🚀 Synchronizing All Detected Upstream Branches: [ $ALL_UPSTREAM_BRANCHES ]"

          # Fresh temporary working clone of source to copy directory structures cleanly
          git clone --recursive https://github.com/Ze0ro99/PiRC.git source_pirc_temp

          for BRANCH in $ALL_UPSTREAM_BRANCHES; do
            echo "🌿 Dynamic Cloud Processing for Branch: [$BRANCH]"
            
            # Switch source temp to the target branch
            cd source_pirc_temp
            git checkout -f "$BRANCH" || continue
            cd ..

            # Switch main workspace repo to target branch or create it
            if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
              git checkout -f "$BRANCH"
            elif git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
              git checkout -b "$BRANCH" "origin/$BRANCH"
            else
              git checkout -b "$BRANCH"
            fi

            # Execute Deep Structural Synchronization Mapping
            SYNC_NODES=("packages" "docs" "standards" "contracts" "proposals")
            NODE_MUTATED=false

            for node in "${SYNC_NODES[@]}"; do
              if [ -d "source_pirc_temp/$node" ]; then
                mkdir -p "$node"
                rsync -av --delete --exclude='.git' --exclude='.github' "source_pirc_temp/$node/" "$node/"
                NODE_MUTATED=true
              fi
            done

            # Append Dynamic Execution Config to the active branch
            API_DIR="packages/economics/src/config"
            if [ "$NODE_MUTATED" = true ]; then
              mkdir -p "$API_DIR"
              cat << INNER_API_EOF > "$API_DIR/api.ts"
// AUTO-GENERATED BY CLOUD MULTI-BRANCH ENGINE v7.5
export const SOVEREIGN_NETWORK_CONFIG = {
    synchronizedAt: "$(date '+%Y-%m-%d %H:%M:%S')",
    activeBranch: "${BRANCH}",
    protocolStandard: "PiRC-207/Stellar-Soroban-Vanguard",
    nodeIntegrationStatus: "CLOUD_AUTOMATED_WORKFLOW",
    endpoints: {
        piRCApiGateway: "https://api.pirc-ecosystem.ze0ro99.io",
        unitySphereNode: "https://api.project-unity-sphere.ze0ro99.io",
        stellarHorizonRelay: "https://horizon-testnet.stellar.org",
        telemetryDashboard: "https://vanguard-bridge.netlify.app"
    }
};
INNER_API_EOF
            fi

            # Persistent Remote Broadcast Routine
            git add .
            if ! git diff --cached --quiet; then
              git commit -m "Automated Multi-Branch Cloud Sync ($BRANCH): Matrix Aligned [Skip CI]"
              git push origin "$BRANCH"
              echo " ✅ Branch [$BRANCH] successfully synced and pushed to Cloud Target."
            else
              echo " 💤 Branch [$BRANCH] is already in perfect symmetry."
            fi
          done

          # Cleanup operational footprints
          rm -rf upstream_pirc_mirror source_pirc_temp
