# Justice Engine - Advanced Security & Logic Audit Workflow
# This configuration ensures full compliance with PiRC1-260 standards
# Optimized for Rust, Python, and JavaScript/TypeScript

name: "CodeQL Advanced Logic & Security"

on:
  push:
    branches: [ "main", "divine_justice", "pirc-*" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '29 0 * * 5'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Automated runner selection based on language requirements
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
     
      fail-fast: false
      matrix:
        include:
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none
        - language: rust
          build-mode: none  # Changed from autobuild to none
        - language: actions
          build-mode: none


    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Ensures full history is available for security auditing

    # Initializes the CodeQL tools for scanning with extended security queries
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Includes specialized queries for financial integrity and code quality
        queries: security-extended,security-and-quality

    # Automatically builds compiled languages like Rust to ensure math integrity
    - name: Autobuild Compiled Code
      if: matrix.build-mode == 'autobuild'
      uses: github/codeql-action/autobuild@v4

    # Performs the actual analysis and generates the security report
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
        # Output results to the Security tab for professional auditing
