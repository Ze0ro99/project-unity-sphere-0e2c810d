name: PiRC Test Suite

on:
permissions:
  contents: write
  pull-requests: write [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.1

      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest
