name: "Immutable Matrix Enforcer"

on:
  pull_request:
    branches: [ "main" ]

jobs:
  Architecture-Verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Verify Core Directories
        run: |
          echo "[MATRIX] Scanning 7-Layer Architecture..."
          REQUIRED_DIRS=("contracts" "standards" "backend" "frontend" "sdk" "tools" "research" "docs")
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "::error file=$dir::CRITICAL: Required architectural directory '$dir' is missing!"
              exit 1
            fi
          done
          echo "[MATRIX] All core directories verified."

      - name: Enforce Naming Conventions
        run: |
          echo "[MATRIX] Ensuring all PiRC standards follow 'PiRC-XXX' format..."
          invalid_files=$(find standards -type f ! -name "PiRC-*.md" ! -name "README.md")
          if [[ -n "$invalid_files" ]]; then
            echo "::error::CRITICAL: Found files in /standards that violate the PiRC-XXX naming convention!"
            echo "$invalid_files"
            exit 1
          fi
          echo "[MATRIX] Naming conventions verified."
