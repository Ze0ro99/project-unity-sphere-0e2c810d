name: Frontend & SDK CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/developer-portal/package.json
    - name: Install and Build Developer Portal
      run: |
        cd frontend/developer-portal
        npm install
        npm run build --if-present
